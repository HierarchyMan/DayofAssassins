# Player-facing copy: plain English only — no flags, permissions, DB, or ops jargon.
# Admin section is staff-only but still avoids raw internal identifiers where possible.

messages:
  no-permission: "&cYou can't use that."
  players-only: "&cOnly players can do that."
  reload-ok: "&aDay of Assassins text and settings reloaded."

event:
  description:
    - "&c&lDay of Assassins"
    - "&7Hunt players with the Assassin's Compass."
    - "&7Rack up kills — highest kills wins."
    - "&7Near the end, a final deathmatch pulls fighters into the arena."
  join-countdown: "&cDay of Assassins &7starts soon — &f/event &7for details."

phase:
  idle: "Idle"
  paused: "Paused"
  countdown: "Starting soon"
  hunt: "Hunt"
  ffa: "Finale"
  ended: "Ended"

hunt:
  start-title: "&c&lTHE HUNT BEGINS"
  start-subtitle: "&7Track with your compass — highest kills wins"
  join-message: "&c&lDay of Assassins &7is live! Use your &fAssassin's Compass &7to hunt."

bossbar:
  # %countdown% / %remaining% = time until the next stage (start / finale / end)
  # %until_end% = time until the event fully ends (optional)
  countdown-title: "&cDay of Assassins &7starts in &f%countdown%"
  title: "&cDay of Assassins &7| &f%top_killer% &8(%top_kills% kills) &7| next &f%remaining%"
  title-no-kills: "&cDay of Assassins &7| &8No leader yet &7| next &f%remaining%"

compass:
  already-have: "&cYou already have the Assassin's Compass."
  received: "&aYou received the Assassin's Compass."
  not-during-event: "&7The Assassin's Compass is only available during the event."
  inv-full-actionbar: "&eInventory full! Free a slot, then use &f/preciv compass"
  tracking-selected: "&7Now tracking: &f%target%"
  other-world-actionbar: "&eYour target is in another world: &f%world%"
  item:
    inactive:
      name: "&cAssassin's Compass"
      lore:
        - "&7Not tracking anyone"
        - "&7Right-click to choose a target"
    tracking:
      name: "&cAssassin's Compass"
      lore:
        - "&7Tracking: &f%target%"
        - "&7World: &f%world%"
        - "&7Right-click to change target"
    tracking-other-world:
      name: "&cAssassin's Compass"
      lore:
        - "&7Target is far away"
        - "&7Player: &f%target%"
        - "&7World: &f%world%"
        - "&7Right-click to pick someone else"
    lost-target:
      name: "&cAssassin's Compass"
      lore:
        - "&7Target is gone"
        - "&7Right-click to choose someone new"
  gui:
    title: "&8Track a player"
    player:
      name: "&f%player%"
      lore:
        - "&7World: &f%world%"
        - "&7Kills: &c%kills%"
        - "&eClick to track"
      lore-selected:
        - "&7World: &f%world%"
        - "&7Kills: &c%kills%"
        - "&aCurrently tracking"
        - "&eClick to keep this target"
    next-page:
      name: "&aNext page"
      lore:
        - "&7Page &f%page%&7/&f%pages%"
    prev-page:
      name: "&aPrevious page"
      lore:
        - "&7Page &f%page%&7/&f%pages%"
    info:
      name: "&eHow to use"
      lore:
        - "&7Pick a player to track."
        - "&7You can only track one at a time."
    no-players:
      name: "&cNo players"
      lore:
        - "&7Nobody online to track right now."

killtop:
  header: "&c&lKill Leaderboard"
  entry: "&e#%position% &f%player% &7— &c%kills% kills"
  empty: "&7No kills yet."

ffa:
  announce-title: "&c&lFinal deathmatch"
  announce-subtitle: "&7Begins in &f%countdown%"
  final-countdown-title: "&c&l%seconds%"
  final-countdown-subtitle: "&7Heading to the arena..."
  start-title: "&c&lFIGHT"
  start-subtitle: "&7The final deathmatch has begun"
  join-message: "&c&lFinale is on! &7Head to the arena — kills still count until the end."
  # Prefer a server-real hint; avoid hard-coded warps that may not exist
  outside-actionbar: "&eFinale is underway — head to the arena!"

end:
  title:
    place-1:
      title: "&6&lGOLD — #1"
      subtitle: "&e%kills% kills"
    place-2:
      title: "&f&lSILVER — #2"
      subtitle: "&7%kills% kills"
    place-3:
      title: "&c&lBRONZE — #3"
      subtitle: "&7%kills% kills"
    place-other:
      title: "&7You finished &f#%place%"
      subtitle: "&7%kills% kills"

rewards:
  # Top placers only — celebratory, no claim/ops language
  eligible: "&aCongrats! You finished &f#%place% &7with &c%kills% &7kills."
  # Staff-only (admin permission)
  staff-summary-header: "&eTop finishers (1–%max_place%):"
  staff-summary-entry: "&7#%place% &f%player% &8(%kills% kills)"

admin:
  start-set: "&aStart time set to &f%time% &7(UTC)"
  end-set: "&aEnd time set to &f%time% &7(UTC)"
  ffa-set: "&aFinale time set to &f%time% &7(UTC)"
  ffa-cleared: "&aCustom finale time cleared — using the default (end minus offset)."
  centerspawn-set: "&aArena center set to your location."
  pos1-set: "&aArena corner 1 set to &f%x% %y% %z%"
  pos2-set: "&aArena corner 2 set to &f%x% %y% %z%"
  wand-given: "&aArena wand given. Left-click corner 1, right-click corner 2."
  invalid-time: "&cInvalid time. Use &fyyyy/MM/dd HH:mm:ss &c(UTC) or &f-r 1d2h5m"
  not-player: "&cOnly players can do that."
  schedule-paused-hint: "&eSchedule updated — event is &cpaused&e. Use &f/preciv gui &eor &f/preciv admin unpause &ewhen ready."
  paused-ok: "&eEvent &cpaused&e. No stages progress until unpause."
  unpaused-ok: "&aEvent unpaused. Stage: &f%phase%"
  status:
    header: "&c&lDay of Assassins &7— status"
    phase: "&7Stage: &f%phase%"
    start: "&7Start: &f%time% &8UTC"
    end: "&7End: &f%time% &8UTC"
    ffa: "&7Finale: &f%time% &8(%source%)"
    remaining: "&7Time left (this stage / clock): &f%countdown%"
    flags: "&7One-shots: &ffinale TP done=%ffa_teleported% &7| &fceremony done=%ceremony_done%"
    kills: "&7Kill rows: &f%rows% &7| Leader: &f%top_killer% &8(%top_kills%)"
    arena: "&7Arena: &f%world% &8| &7%cuboid% &8| center &f%center%"
    vanish: "&7Vanish check: &f%backend%"
    eligible: "&7Finale TP candidates online: &f%count%"
  startnow-ok: "&aEvent started now (&f%time%&a). Stage: &f%phase%"
  ffanow-ok: "&aFinale set to now (&f%time%&a). Stage: &f%phase%"
  endnow-ok: "&aEvent ended now. Stage: &f%phase%"
  forcetp-ok: "&aForced finale teleport."
  forcetp-not-ffa: "&cNot in the finale yet. Use &f/preciv admin ffanow &cor wait for the schedule."
  forcetp-in-progress: "&cFinale teleport is already running."
  forcetp-no-spawns: "&cFinale teleport failed: arena world missing or no safe ground. Fix the arena, then retry."
  forcetp-failed: "&cFinale teleport failed. Check the console, then try again."
  forceceremony-ok: "&aForced end ceremony."
  forceceremony-not-ended: "&cEvent has not ended yet. Use &f/preciv admin endnow &cfirst."
  resetflags-ok: "&aCleared one-shot markers (finale TP + ceremony)."
  eligible-header: "&eFinale TP candidates (&f%count%&e):"
  eligible-empty: "&7Nobody online is ready (survival, not vanished, no TP skip)."
  eligible-entry: "&7- &f%player%"
  clearkills-confirm: "&cThis wipes all kill scores. Run &f/preciv admin clearkills confirm &cto proceed."
  clearkills-ok: "&aAll kill scores cleared."
  phase-usage: "&cUsage: /preciv admin phase <idle|paused|countdown|hunt|ffa|ended>"
  phase-ok: "&aSchedule adjusted. Stage: &f%phase%"

wand:
  name: "&6Arena Selection Wand"
  lore:
    - "&7Left-click: corner 1"
    - "&7Right-click: corner 2"

host:
  gui:
    main:
      title: "&8Day of Assassins — Host"
      status:
        name: "&c&lEvent status"
      times:
        name: "&eSchedule times"
      rewards:
        name: "&6Rewards"
      ffa:
        name: "&cFinale settings"
    times:
      title: "&8Schedule times"
      prompt: "&eType &f%field%&e: &f%format%&e. &7Or &fcancel"
      set-ok: "&a%field% set to &f%time% &7UTC &8(event paused)"
      cleared: "&a%field% cleared. &8(event paused)"
      cancelled: "&7Cancelled."
      invalid: "&cCould not read that. Use &f%format% &cor &fcancel"
      use-chat-clear: "&7To clear start/end, set a new time or clear via admin tools."
    rewards:
      title: "&8Rewards"
    ffa:
      title: "&8Finale settings"
    common:
      back: "&7← Back"
      close: "&cClose"
