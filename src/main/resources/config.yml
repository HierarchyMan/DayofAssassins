times:
  start: ""
  end: ""
  ffa: ""

# End-ceremony reward eligibility (chat message only — staff hand out real prizes)
rewards:
  enabled: true
  # Dense-rank place must be <= this (1 = #1 only; 3 = places 1–3 including ties)
  max-place: 3

ffa:
  before-end-seconds: 1800
  announce-lead-seconds: 3600
  announce-interval-seconds: 600
  outside-actionbar-seconds: 60
  # Last-second beat before ring TP: titles 5…1 with rising pitch sound
  final-countdown:
    enabled: true
    from-seconds: 5
    # all = everyone online | eligible = same filter as FFA TP
    audience: all
    title-fade-in-ms: 0
    title-stay-ms: 800
    title-fade-out-ms: 150
    pitch-base: 0.9
    pitch-step: 0.12
  # Cap ring diameter at this fraction of the longest cuboid horizontal side (many players).
  max-diameter-fraction: 0.75
  # Target distance between adjacent players on the ring. Few players → tight ring (~this far);
  # many players grow up to the diameter cap so the arena fills.
  min-player-spacing: 8
  min-air-above: 2
  y-search-range: 12
  ring-margin-blocks: 2

arena:
  world: world
  # When pos1/pos2 share the same Y (both corners on the floor), FFA expands to this
  # vertical span (blocks) so standable Y search is not empty. Prefer real floor+ceiling corners.
  min-vertical-span: 24
  pos1:
    x: 0
    y: 64
    z: 0
  pos2:
    x: 100
    y: 80
    z: 100
  centerspawn:
    x: 50.5
    y: 65.0
    z: 50.5
    yaw: 0.0
    pitch: 0.0

# When true, plugin starts with "nobypass" ON: teleport-lock + hunt RTP ignore
# preciv.teleport.bypass / preciv.spawn.rtp.bypass until /preciv nobypass toggles it.
# State is in-memory only (not persisted); restart re-reads this flag.
nobypass:
  enabled-at-start: true

# Spawn safe zone (TP-lock free zone) + hunt RTP source region.
# Set with /preciv admin spawnwand (or set spawnpos1|spawnpos2). FFA has no TP lock.
# Usually the same world as the arena (no separate spawn world required).
spawn:
  configured: false
  world: world
  pos1:
    x: 0
    y: 64
    z: 0
  pos2:
    x: 0
    y: 64
    z: 0
  # Hunt only (not paused, not FFA): BetterRTP anyone standing in the spawn cuboid
  # OR the FFA arena cuboid (same world is fine). Kickoff once on enter HUNT;
  # join / world-change / post-teleport also re-check while live HUNT.
  hunt-rtp:
    enabled: true
    # BetterRTP destination world; empty = RTP in the player's current world (same world)
    world: ""
    # Short safety window (ticks) so BetterRTP's PLUGIN teleport is not cancelled by the
    # hunt lock. Default 40 = 2s. Cleared as soon as that TP lands. Does NOT unlock /spawn.
    # Hard-capped at 100 ticks. (Legacy bypass-ms is still read, converted, and capped.)
    bypass-ticks: 40
  # Hunt only: on death, move players off the fight camp.
  # Prefer Essentials home when set; otherwise force BetterRTP (same bridge as hunt dump).
  respawn-relocate:
    enabled: true
    prefer-essentials-home: true

# /rtp during HUNT: own the command (ignore blocklist for "rtp") and run our BetterRTP.
# Outside HUNT: lock is off — native /rtp works; we do not intercept.
rtp:
  # true = intercept /rtp in HUNT; false = leave it on the teleport-lock blocklist
  command-override: true
  # When override is true: false denies /rtp with a message; true runs force BetterRTP
  allow-command: true
  # Cooldown only for this override path (not kickoff / zone / respawn RTP)
  command-cooldown-seconds: 300

# Kill credit anti-farm (in-memory only — no DB schema change)
kills:
  anti-farm:
    enabled: true
    # First N kills on the same victim in the window count; further do not
    max-credits-per-victim: 1
    # Sliding window (seconds). 300 = 5 minutes
    window-seconds: 300

# Hunt only: block TP commands, plugin teleports, and world-changes.
# Cross-world moves (e.g. /spawn hub) always blocked. World change is not cancellable —
# illegal ones are snapped back to last safe location. FFA = unlocked.
# Free cuboid only allows same-world hops that stay inside spawn/arena (not /spawn out).
teleport-lock:
  enabled: true
  # Console [tp-lock] lines explaining every allow/block decision (turn on to diagnose)
  debug: false
  commands:
    - spawn
    - espawn
    - spawnworld
    - hub
    - lobby
    - leave
    - home
    - homes
    - ehome
    - sethome
    - delhome
    - back
    - eback
    - rtp
    - wild
    - tpa
    - tpahere
    - tpaccept
    - tpyes
    - tpdeny
    - tno
    - warp
    - warps
    - top
    - tp
    - tpo
    - tphere
    - call
    - bring
    - etp
    - mv
    - mvtp
    - mvp
    - world
    - worlds
    - server


storage:
  file: data.db

compass:
  material: COMPASS
  custom-model-data: 0
  full-inv-actionbar-seconds: 60

wand:
  material: BLAZE_ROD
  custom-model-data: 0

# Separate item from arena wand (own PDC). Selects spawn cuboid corners.
spawn-wand:
  material: BLAZE_ROD
  custom-model-data: 0

# Cosmetic only — last N seconds of COUNTDOWN before hunt actually starts.
# Does not change phase, kill rules, compasses, or teleport locks.
grace:
  enabled: true
  # 600 = 10 minutes. 0 = off even if enabled is true.
  seconds: 600

tab:
  scoreboard:
    # Inject into the existing TAB board (never replaces the whole board).
    # REQUIRES plugins/TAB/config.yml → scoreboard.enabled: true.
    # false (default) = INSERT contiguous rows at offset (board grows; normal rows shift down).
    # true = OLD replace mode: overwrite existing rows at those indices only (no grow/shift).
    #        Needs enough lines already on the TAB board (filler rows at offset).
    replace-existing: false
    # Relative lines start at this 0-based index; absolute "line:" keys still override.
    offset: 3
    # How many ranked slots to fill as %top1_name%/%top1_kills% … %topN_*
    top-slots: 4
    empty-name: "—"
    empty-kills: "0"
    # Injected rows in order from offset. Placeholders:
    #   %top1_name% %top1_kills% %top1_place% … through top-slots
    #   %top_killer% / %top_kills%  (aliases for #1)
    #   %phase%  %remaining% (until next phase)  %until_end% (until event end)
    # PlaceholderAPI (soft):
    #   live: %preciv_top_1_name% %preciv_top_1_place% %preciv_top_1_kills% …
    #   last past game: %preciv_prev_top_1_name% %preciv_last_game_id% %preciv_game_count%
    #   past game N (ids 1,2,3…): %preciv_game_3_top_1_name% %preciv_game_3_top_1_kills% %preciv_game_3_top_1_place%
    lines:
      - "&c&l#1 &f%top1_name% &8(%top1_kills%)"
      - "&6#2 &f%top2_name% &8(%top2_kills%)"
      - "&e#3 &f%top3_name% &8(%top3_kills%)"
      - "&7#4 &f%top4_name% &8(%top4_kills%)"
      # %phase% = current stage; %timer_label% names the destination; %remaining% = until that boundary
      # e.g. "Hunt · Finale in 25m" or "Finale · Ends in 15m" — never "Hunt · next …"
      - "&7%phase% &8· &7%timer_label% &f%remaining%"
  bossbar:
    # This plugin's event bar. Prefers TAB BossBarManager when TAB bossbar.enabled is true;
    # otherwise uses Paper/Bukkit BossBar (no need to enable TAB's own bossbar feature).
    enabled: true
    # Fallback color/style when a phase has no override below.
    # Colors (both backends): PINK BLUE RED GREEN YELLOW PURPLE WHITE
    color: RED
    # Style: PROGRESS (solid fill) or NOTCHED_6 / NOTCHED_10 / NOTCHED_12 / NOTCHED_20
    # Paper maps PROGRESS→SOLID and NOTCHED_N→SEGMENTED_N.
    style: PROGRESS
    # Per-stage bar color (overrides color). Keys: countdown, grace, hunt, ffa.
    colors:
      countdown: YELLOW
      grace: GREEN
      hunt: RED
      ffa: PURPLE

effects:
  enabled: true
  # Cosmetic grace enter (last N min of countdown) — title text is lang.yml grace.*
  grace:
    start:
      sound:
        enabled: true
        sound: "minecraft:block.note_block.chime"
        volume: 0.9
        pitch: 1.1
      particle:
        enabled: false
        particle: HAPPY_VILLAGER
        count: 8
      title:
        enabled: true
        fade-in: 250
        stay: 3000
        fade-out: 500
  hunt:
    start:
      sound:
        enabled: true
        sound: "minecraft:entity.ender_dragon.growl"
        volume: 0.6
        pitch: 1.2
      particle:
        enabled: false
        particle: FLAME
        count: 8
  compass:
    open-gui:
      sound:
        enabled: true
        sound: "minecraft:item.spyglass.use"
        volume: 1.0
        pitch: 1.0
      particle:
        enabled: true
        particle: ENCHANT
        count: 12
  menu:
    select-target:
      sound:
        enabled: true
        sound: "minecraft:ui.button.click"
        volume: 1.0
        pitch: 1.2
      particle:
        enabled: true
        particle: HAPPY_VILLAGER
        count: 8
    page-turn:
      sound:
        enabled: true
        sound: "minecraft:item.book.page_turn"
        volume: 0.8
        pitch: 1.0
      particle:
        enabled: false
        particle: CRIT
        count: 4
    deny:
      sound:
        enabled: true
        sound: "minecraft:entity.villager.no"
        volume: 0.7
        pitch: 1.0
      particle:
        enabled: false
        particle: SMOKE
        count: 3
  kill:
    credited:
      sound:
        enabled: true
        sound: "minecraft:entity.player.levelup"
        volume: 1.0
        pitch: 1.0
      particle:
        enabled: true
        particle: SOUL
        count: 20
      # Title shown to the killer (text lives in lang.yml: kill.credited-title / kill.credited-subtitle)
      title:
        enabled: true
        fade-in: 250
        stay: 1500
        fade-out: 500
    # Sound heard by everyone EXCEPT the killer (default: thunder)
    global:
      sound:
        enabled: true
        sound: "minecraft:entity.lightning_bolt.thunder"
        volume: 1.0
        pitch: 1.0
      particle:
        enabled: false
  ffa:
    announce:
      sound:
        enabled: true
        sound: "minecraft:block.note_block.pling"
        volume: 1.0
        pitch: 1.0
    final-countdown:
      sound:
        enabled: true
        sound: "minecraft:block.note_block.pling"
        volume: 1.0
        # Base pitch; runtime overrides with pitch-base + pitch-step * steps
        pitch: 0.9
      particle:
        enabled: false
        particle: NOTE
        count: 4
    teleport:
      sound:
        enabled: true
        sound: "minecraft:entity.enderman.teleport"
        volume: 1.0
        pitch: 1.0
  end:
    normal:
      sound:
        enabled: true
        sound: "minecraft:ui.toast.challenge_complete"
        volume: 0.8
        pitch: 1.0
    top3:
      sound:
        enabled: true
        sound: "minecraft:ui.toast.challenge_complete"
        volume: 1.0
        pitch: 1.4
